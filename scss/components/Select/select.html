        <h1>Select</h1>

        <div class="inputs-container">

<!-- Default -->
            <div class="input-group">
                <label class="input-label">Select option</label>
                <div class="select-wrapper">
                    <select class="select-field">
                        <option>Option 1</option>
                        <option>Option 2</option>
                    </select>
                </div>
                <span class="input-helper">Helper text</span>
            </div>

<!-- Error -->
            <div class="input-group input-group--error">
                <label class="input-label">Select option</label>
                <div class="select-wrapper">
                    <select class="select-field">
                        <option>Option 1</option>
                    </select>
                </div>
                <span class="input-helper">please select an option</span>
            </div>

<!-- Success -->
            <div class="input-group input-group--success">
                <label class="input-label">Select option</label>
                <div class="select-wrapper">
                    <select class="select-field">
                        <option>Option 1</option>
                    </select>
                </div>
                <span class="input-helper">Success</span>
            </div>
        </div> 
    </body>
