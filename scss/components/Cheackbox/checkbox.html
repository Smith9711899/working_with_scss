        <h1>Checkboxes</h1>

        <div class="inputs-container">

<!-- Default -->
            <div class="input-group">
                <label class="input-label">Select options</label>
                <div class="checkbox-group">
                    <label class="checkbox">
                        <input type="checkbox" />
                        <span class="checkbox-custom"></span>
                        Option 1
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" />
                        <span class="checkbox-custom"></span>
                        Option 2
                    </label>
                </div>
            </div>

<!-- Error -->
            <div class="input-group input-group--error">
                <label class="input-label">Select options</label>
                <div class="checkbox-group">
                    <label class="checkbox-error">
                        <input type="checkbox" />
                        <span class="checkbox-custom">Option 1</span>
                    </label>
                </div>
            </div>

<!-- Success -->
            <div class="input-group input-group--success">
                <label class="input-label">Select options</label>
                <div class="checkbox-group">
                    <label class="checkbox-success">
                        <input type="checkbox" />
                        <span class="checkbox-custom">Option 1</span>
                    </label>
                </div>
            </div>
        </div>
