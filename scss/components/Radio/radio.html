        <h1>Radio Buttons</h1>

        <div class="inputs-container">

<!-- Default -->
            <div class="input-group">
                <label class="input-label">Choose one</label>
                <div class="radio-group">
                    <label class="radio">
                        <input type="radio" name="r1" />
                        <span class="radio-custom"></span>
                        <span class="radio-label">Option 1</span>
                    </label>
                    <label class="radio">
                        <input type="radio" name="r1" />
                        <span class="radio-custom"></span>
                        <span class="radio-label">Option 2</span>
                    </label>
                </div>
            </div>

<!-- Error -->
            <div class="input-group input-group--error">
                <label class="input-label">Choose one</label>
                <div class="radio-group">
                    <label class="radio">
                        <input type="radio" name="r2" />
                        <span class="radio-custom"></span>
                        <span class="radio-label">Option 1</span>
                    </label>
                    <label class="radio">
                        <input type="radio" name="r2" />
                        <span class="radio-custom"></span>
                        <span class="radio-label">Option 2</span>
                    </label>
                </div>
            </div>

<!-- Success -->
            <div class="input-group input-group--success">
                <label class="input-label">Choose one</label>
                <div class="radio-group">
                    <label class="radio">
                        <input type="radio" name="r3" />
                        <span class="radio-custom"></span>
                        <span class="radio-label">Option 1</span>
                    </label>
                    <label class="radio">
                        <input type="radio" name="r3" />
                        <span class="radio-custom"></span>
                        <span class="radio-label">Option 2</span>
                    </label>
                </div>
            </div>
        </div>
