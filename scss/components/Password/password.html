    <h1>Password Inputs</h1>

        <div class="inputs-container">

<!-- DEFAULT (HIDDEN) -->
            <div class="input-group">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" class="input-field" value="mypassword" />
                    <button class="input-toggle">Show</button>
                </div>
                <span class="input-helper">Helper text</span>
            </div>

<!-- DEFAULT (VISIBLE) -->
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <input type="text" class="input-field" value="mypassword" />
                        <button class="input-toggle">Hide</button>
                </div>
                <span class="input-helper">Helper text</span>
            </div>

<!-- ERROR (HIDDEN) -->
            <div class="input-group input-group--error">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <input type="password" class="input-field" value="wrong password" />
                        <button class="input-toggle">Show</button>
                    </div>
                <span class="input-helper">Incorrect password</span>
            </div>

  <!-- ERROR (VISIBLE) -->
            <div class="input-group input-group--error">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                    <input type="text" class="input-field" value="wrong password" />
                    <button class="input-toggle">Hide</button>
                </div>
                <span class="input-helper">Incorrect password</span>
            </div>

<!-- SUCCESS (HIDDEN) -->
            <div class="input-group input-group--success">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" class="input-field" value="correct password" />
                    <button class="input-toggle">Show</button>
                </div>
                <span class="input-helper">Looks good</span>
            </div>

<!-- SUCCESS (VISIBLE) -->
            <div class="input-group input-group--success">
                <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <input type="text" class="input-field" value="correct password" />
                        <button class="input-toggle">Hide</button>
                    </div>
                <span class="input-helper">Success</span>
            </div>

        </div>
    </body>
