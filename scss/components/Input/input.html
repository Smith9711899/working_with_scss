    <h1>Inputs</h1>

        <div class="inputs-container">

<!-- Default -->
            <div class="input-group">
                <label class="input-label">Label</label>
                <input class="input-field" placeholder="Placeholder text" />
                <span class="input-helper">Helper text</span>
            </div>

<!-- Focus -->
            <div class="input-group">
                <label class="input-label">Label</label>
                <input class="input-field" placeholder="Placeholder text" autofocus />
                <span class="input-helper">Helper text</span>
            </div>

<!-- Error -->
            <div class="input-group input-group--error">
                <label class="input-label">Label</label>
                <input class="input-field" placeholder="Placeholder text" />
                <span class="input-helper">Error Message</span>
            </div>

<!-- Success -->
            <div class="input-group input-group--success">
                <label class="input-label">Label</label>
                <input class="input-field" placeholder="Placeholder text" />
                <span class="input-helper">Success Message</span>
            </div>

<!-- Disabled -->
            <div class="input-group">
                <label class="input-label">Label</label>
                <input class="input-field" placeholder="Placeholder text" disabled />
                <span class="input-helper">Helper text</span>
            </div>
        </div>
